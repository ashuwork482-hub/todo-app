<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>My Todo List</title>

<style>

/* ===== Global Styles ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f6fb;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* ===== Main Container ===== */
.todo-container {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
     box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    border-radius: 20px;
    padding: 30px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;

}

.todo-container:hover {
 transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* ===== Heading ===== */
.todo-container h1 {
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: bold;
    font-size: 28px;
    background: linear-gradient(to right, #6c63ff, #00d4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 25px;
}

/* ===== Input Section ===== */
.input-section {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.input-section input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: 0.3s ease;
}

.input-section input:focus {
    border-color: #6c63ff;
}

/* ===== Buttons ===== */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s ease;
}

.add-btn {
    background: #6c63ff;
    color: white;
}

.add-btn:hover {
    background: #5848e5;
}

/* ===== Task List ===== */
.task-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.task {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f9f9ff;
    padding: 10px;
    border-radius: 8px;
    transition: 0.3s ease;
}

.task:hover {
    background: #eef0ff;
}

/* Left Side (Checkbox + Text) */

/* Line-through when checked */


/* Delete Button */
.delete-btn {
    background: #ff4d4d;
    color: white;
    font-size: 14px;
    padding: 5px 10px;
}

.delete-btn:hover {
    background: #e60000;
}
.edit-btn {
    background: #4d94ff; /* blue color */
    color: white;
    font-size: 14px;
    padding: 5px 8px;
    border-radius: 10px;
    margin-right: 5px;
}

.edit-btn:hover {
    background: #0066ff;
}


/* ===== Responsive Design ===== */
@media (max-width: 480px) {
    .todo-container {
        margin: 15px;
        padding: 20px;
    }

    .input-section {
        flex-direction: column;
    }

    .add-btn {
        width: 100%;
    }
}

</style>
</head>
<!-- input[type="checkbox"]:checked+span{
 text-decoration:line-through;
 color:#999;

} -->
 <!-- flex: 1 = grow karo aur available space le lo -->
<!-- + span means next sibling -->
<body>

<main class="todo-container">
    <h1>My Todo List</h1>

    <!-- Input Section -->
    <section class="input-section">
        <input type="text" placeholder="Enter a new task...">
        <button class="add-btn">
             <i class="fa-solid fa-plus"></i>
        </button>
    </section>

    <!-- Task List -->
    <ul class="task-list">
            </ul>
</main>
<script>

const input = document.querySelector("input");
const addBtn = document.querySelector(".add-btn");
const taskList = document.querySelector(".task-list");

input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        addBtn.click();
    }
});
// Add Task
addBtn.addEventListener("click", function () {

    const taskText = input.value.trim();

    if (taskText === "") {
        alert("Please enter a task");
        return;
    }

    // Create LI
    const li = document.createElement("li");
    li.classList.add("task");

  li.innerHTML = `
    <div class="task-left">
        <span>${taskText}</span>
    </div>
   <div class="btns">
     <button class="edit-btn"> <i class="fa-solid fa-pen"></i></button>
    <button class="delete-btn">   <i class="fa-solid fa-trash"></i></button>
    </div>
`;
    taskList.appendChild(li);

    input.value = ""; // clear input

    // Delete functionality for new task
      const deleteButtons = document.querySelectorAll(".delete-btn")
    deleteButtons.forEach((button) => {
        button.addEventListener('click',function(){
            const taskItem = this.closest('.task');
            taskItem.remove();
        })
    })

    const editBtn = li.querySelector(".edit-btn");
editBtn.addEventListener("click", function(){
    const span = li.querySelector("span");
    const newTask = prompt("Edit your task:", span.textContent);
    if(newTask !== null && newTask.trim() !== ""){
        span.textContent = newTask.trim();
    }
});
});


</script>

</body>
</html>
